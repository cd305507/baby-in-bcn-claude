<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1 stops iOS Safari from auto-zooming when the user
         focuses an input — in standalone-PWA mode, that zoom often gets
         stuck after blur, leaving the page visibly oversized. Pinch-zoom
         still works because it's an explicit user gesture. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Baby in BCN</title>
    <meta name="description" content="Itinerary, packing, naps, and bookings for the Barcelona trip." />

    <!-- PWA: manifest is auto-injected by vite-plugin-pwa -->
    <meta name="theme-color" content="#0E172E" />

    <!-- iOS home-screen install -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BABY in BCN" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
